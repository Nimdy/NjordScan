# Optional: run the NjordScan operational dashboard always-on.
#
#   docker compose -f docker/monitor.compose.yml up -d      # → http://localhost:8770
#   docker compose -f docker/monitor.compose.yml down
#
# Your project registry + scan history persist in the named volume, so it survives
# restarts. git URLs and live URLs work out of the box. To monitor LOCAL folders,
# mount them (see the commented volume) and register the *container* path in the UI
# (e.g. mount ~/code -> /projects, then add `/projects/my-app`).
#
# Prefer zero Docker? Just run `njordscan monitor` (or `nohup njordscan monitor --no-open &`)
# — the dashboard is a plain package command; this file is only for hands-off always-on.
name: njordscan-monitor

services:
  monitor:
    image: python:3.12-slim
    working_dir: /data
    command: >
      sh -c "apt-get update -qq && apt-get install -y -qq --no-install-recommends git >/dev/null 2>&1;
             pip install --no-cache-dir --pre njordscan &&
             njordscan monitor --host 0.0.0.0 --no-open"
    environment:
      NJORDSCAN_HOME: /data
    ports:
      - "${MONITOR_PORT:-8770}:8770"
    volumes:
      - njordscan-data:/data
      # - ${HOME}/code:/projects:ro   # uncomment to watch local folders; register /projects/<app>
    restart: unless-stopped

volumes:
  njordscan-data:
