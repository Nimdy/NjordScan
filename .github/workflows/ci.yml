name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e '.[dev]'
      - name: Lint
        run: ruff check njordscan
      - name: Test
        run: pytest -q
      - name: Dogfood — scan our own fixtures
        run: |
          njordscan scan tests/fixtures/clean-app --fail-on high
          njordscan scan tests/fixtures/vulnerable-app --format sarif -o njordscan.sarif || true
      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: njordscan-sarif-${{ matrix.python-version }}
          path: njordscan.sarif
