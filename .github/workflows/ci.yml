name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e '.[dev]'
      - name: Lint
        run: ruff check njordscan
      - name: Test
        run: pytest -q
      - name: Dogfood — scan our own fixtures
        run: |
          njordscan scan tests/fixtures/clean-app --fail-on high
          njordscan scan tests/fixtures/vulnerable-app --format sarif -o njordscan.sarif || true
      - name: Upload SARIF
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: njordscan-sarif-${{ matrix.python-version }}
          path: njordscan.sarif

  # Build the artifact we actually ship and prove it installs + runs from a clean
  # venv — a scanner whose own CI never builds its wheel is one packaging bug away
  # from a broken first release, exactly when trust is most fragile.
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade build twine
          python -m build
          twine check dist/*
      - name: Smoke-install the wheel in a clean venv and run it
        run: |
          python -m venv /tmp/smoke
          /tmp/smoke/bin/pip install dist/*.whl
          /tmp/smoke/bin/njordscan --version
          /tmp/smoke/bin/njordscan doctor
          /tmp/smoke/bin/njordscan scan tests/fixtures/clean-app --fail-on high
      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: njordscan-dist
          path: dist/*
