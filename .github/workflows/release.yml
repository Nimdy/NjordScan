name: release

# Publish to PyPI using PyPI Trusted Publishing (OIDC) — no API token or password is
# stored anywhere. Triggers on either a pushed version tag (e.g. v2.0.0b2) or a
# published GitHub Release; both build the package and publish it.
on:
  push:
    tags: ["v*"]       # pushing a version tag publishes that version
  release:
    types: [published]
  workflow_dispatch:   # allow a manual run from the Actions tab

permissions:
  contents: read

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist + wheel
        run: |
          python -m pip install --upgrade build twine
          python -m build
          twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # The 'pypi' environment must match the one configured on PyPI's trusted publisher.
    environment:
      name: pypi
      url: https://pypi.org/project/njordscan/
    permissions:
      id-token: write   # REQUIRED: lets the job mint the OIDC token PyPI trusts
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI (Trusted Publishing — no token)
        uses: pypa/gh-action-pypi-publish@release/v1
